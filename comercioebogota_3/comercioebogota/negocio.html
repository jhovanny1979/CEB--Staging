<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Negocio &mdash; Comercio e-Bogot&aacute;</title>
  <script>
    if (location.protocol === 'file:') {
      const page = location.pathname.split('/').pop() || 'index.html';
      const storedHost = localStorage.getItem('ceb_front_host') || '127.0.0.1';
      const target = 'http://' + storedHost + ':5500/' + page + location.search + location.hash;
      location.replace(target);
    }
  </script>

  <link rel="stylesheet" href="css/styles.css?v=20260320fix9" />
  <style>

    /* â”€â”€ PAGE STRUCTURE â”€â”€ */
    body { background: var(--dark); }

    .biz-page { padding-top: 68px; }

    /* â”€â”€ HERO HEADER â”€â”€ */
    .biz-hero {
      position: relative;
      background: var(--dark-2);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .biz-hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 80% at 80% 50%, rgba(125,201,0,.06) 0%, transparent 65%),
        radial-gradient(ellipse 30% 50% at 10% 60%, rgba(125,201,0,.04) 0%, transparent 60%);
    }
    .biz-hero-inner {
      position: relative; z-index: 1;
      max-width: 1180px; margin: 0 auto;
      padding: 52px 5% 40px;
      display: flex; align-items: flex-start; gap: 36px;
    }

    /* Logo */
    .biz-logo-wrap {
      flex-shrink: 0;
      width: 120px; height: 120px;
      border-radius: 22px;
      overflow: hidden;
      background: var(--dark-3);
      border: 2px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
    }
    .biz-logo-wrap img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .biz-logo-placeholder {
      font-size: 2.8rem;
    }

    /* Info */
    .biz-info { flex: 1; min-width: 0; }
    .biz-cat-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .biz-name {
      font-family: var(--font-main);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 500; line-height: 1.1;
      margin-bottom: 12px;
    }
    .biz-desc {
      font-size: .92rem; color: var(--text-muted);
      line-height: 1.75; max-width: 600px;
      margin-bottom: 18px;
    }
    .biz-meta-row {
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
      font-size: .82rem; color: var(--text-muted);
    }
    .biz-meta-item { display: flex; align-items: center; gap: 6px; }
    .biz-meta-item svg { flex-shrink: 0; opacity: .7; }

    /* Status pill */
    .biz-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: .72rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase;
    }
    .biz-status.open  { background: rgba(46,204,113,.12); color: #2ECC71; border: 1px solid rgba(46,204,113,.2); }
    .biz-status.close { background: rgba(229,85,85,.1);   color: #E55;   border: 1px solid rgba(229,85,85,.2); }
    .biz-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* â”€â”€ BODY LAYOUT â”€â”€ */
    .biz-body {
      max-width: 1180px; margin: 0 auto;
      padding: 40px 5% 80px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 40px;
      align-items: start;
    }

    .biz-main { min-width: 0; }
    .biz-aside { position: sticky; top: 88px; }

    /* â”€â”€ SECTIONS â”€â”€ */
    .biz-section { margin-bottom: 48px; }
    .biz-section-title {
      font-family: var(--font-main);
      font-size: 1.55rem; font-weight: 500;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .biz-section-title em { font-style: italic; color: var(--gold-light); }
    .biz-section-count { font-family: var(--font-main); font-size: .7rem; color: var(--text-muted); }

    /* â”€â”€ GALLERY â”€â”€ */
    .gallery-layout { display: flex; flex-direction: column; gap: 12px; }

    /* Featured image */
    .gallery-featured {
      width: 100%;
      aspect-ratio: 16/7;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--dark-3);
      border: 1px solid var(--border);
    }
    .gallery-featured img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .4s ease;
    }
    .gallery-featured:hover img { transform: scale(1.03); }
    .gallery-featured-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.35) 0%, transparent 50%);
      opacity: 0; transition: opacity .3s;
      display: flex; align-items: flex-end; padding: 18px;
    }
    .gallery-featured:hover .gallery-featured-overlay { opacity: 1; }
    .gfo-text { color: white; font-size: .78rem; letter-spacing: .06em; }

    /* Thumbs strip */
    .gallery-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 8px;
    }
    .gallery-strip-thumb {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s, transform .15s;
      background: var(--dark-3);
    }
    .gallery-strip-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-strip-thumb:hover { transform: scale(1.04); }
    .gallery-strip-thumb.active { border-color: var(--gold); }

    /* Empty gallery */
    .gallery-empty {
      aspect-ratio: 16/7;
      border-radius: var(--radius-lg);
      border: 1.5px dashed var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-muted); font-size: .85rem;
    }
    .gallery-empty .ge-icon { font-size: 2.5rem; }

    /* â”€â”€ PROMOTIONS â”€â”€ */
    .promo-cards { display: flex; flex-direction: column; gap: 16px; }
    .promo-card {
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      cursor: pointer;
      transition: border-color .2s, transform .2s;
    }
    .promo-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
    .promo-card-media {
      width: 180px; flex-shrink: 0;
      min-height: 132px;
      display: flex;
      align-items: stretch;
      background: linear-gradient(135deg, var(--dark-3), var(--dark-4));
    }
    .promo-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .promo-card-img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--dark-3), var(--dark-4));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    .promo-card-body {
      padding: 22px 24px;
      flex: 1; min-width: 0;
    }
    .promo-card-date {
      font-family: var(--font-main);
      font-size: .65rem; color: var(--gold);
      letter-spacing: .14em; text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .promo-card-title {
      font-family: var(--font-main);
      font-size: 1.45rem; font-weight: 600;
      margin-bottom: 10px; line-height: 1.2;
    }
    .promo-card-content {
      font-size: .875rem; color: var(--text-muted);
      line-height: 1.75;
    }
    .promo-card-content b, .promo-card-content strong { color: var(--text); }

    /* Empty promos */
    .promo-empty {
      padding: 40px; text-align: center;
      border: 1px dashed var(--border); border-radius: var(--radius);
      color: var(--text-muted); font-size: .875rem;
    }

    /* Promotion modal */
    #promoModal {
      position: fixed;
      inset: 0;
      z-index: 9100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.82);
    }
    #promoModal.open { display: flex; }
    .promo-modal-card {
      width: min(560px, 94vw);
      max-height: 86vh;
      overflow: auto;
      background: linear-gradient(135deg, var(--dark-2), var(--dark-3));
      border: 1px solid var(--gold-dim);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.52);
      padding: 14px 14px 16px;
    }
    .promo-modal-close {
      border: 1px solid var(--border);
      background: var(--dark-3);
      color: var(--gold-light);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: .92rem;
      float: right;
    }
    .promo-modal-title {
      font-family: var(--font-main);
      font-size: 1.18rem;
      font-weight: 600;
      margin: 2px 0 4px;
      clear: both;
    }
    .promo-modal-date {
      font-family: var(--font-main);
      font-size: .64rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .promo-modal-content {
      color: var(--text);
      font-size: .86rem;
      line-height: 1.55;
      margin-bottom: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, .02);
    }
    .promo-modal-gallery-main {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--dark-4);
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .promo-modal-gallery-main img {
      width: 100%;
      max-height: 250px;
      object-fit: contain;
      display: block;
      background: #000;
    }
    .promo-modal-gallery-empty {
      color: var(--text-muted);
      text-align: center;
      font-size: .85rem;
      padding: 26px;
    }
    .promo-modal-img-desc {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: .78rem;
      line-height: 1.45;
      min-height: 18px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(201, 168, 76, .05);
    }
    .promo-modal-thumbs {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 6px;
    }
    .promo-modal-thumb {
      border: 2px solid transparent;
      border-radius: 7px;
      overflow: hidden;
      background: var(--dark-3);
      cursor: pointer;
      padding: 0;
    }
    .promo-modal-thumb.active { border-color: var(--gold); }
    .promo-modal-thumb img {
      width: 100%;
      height: 58px;
      object-fit: cover;
      display: block;
    }

    /* â”€â”€ ASIDE CARD â”€â”€ */
    .aside-card {
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }
    .aside-card-title {
      font-family: var(--font-main);
      font-size: .68rem; letter-spacing: .16em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 16px;
    }

    /* Contact rows */
    .contact-row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: .85rem; color: var(--text-muted);
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-row .cr-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--dark-3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; }
    .contact-row a { color: var(--text-muted); text-decoration: none; transition: color .2s; }
    .contact-row a:hover { color: var(--gold-light); }

    /* Hours */
    .hours-table { width: 100%; font-size: .82rem; }
    .hours-table tr td { padding: 5px 0; }
    .hours-table tr td:first-child { color: var(--text-muted); width: 50%; }
    .hours-table tr td:last-child { font-weight: 500; text-align: right; }
    .hours-table .today { color: var(--gold); font-weight: 700; }
    .hours-closed { color: var(--text-muted) !important; font-style: italic; }

    /* Social buttons */
    .social-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .social-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-muted); text-decoration: none;
      font-size: .8rem; font-weight: 500;
      transition: all .2s;
    }
    .social-btn:hover { border-color: var(--gold-dim); color: var(--gold-light); background: rgba(125,201,0,.05); }
    .social-btn svg { flex-shrink: 0; }

    /* WhatsApp contact btn */
    .wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #25D366; color: white;
      padding: 13px 20px; border-radius: 10px;
      text-decoration: none; font-weight: 600; font-size: .9rem;
      transition: all .2s; margin-top: 12px;
      box-shadow: 0 4px 16px rgba(37,211,102,.25);
    }
    .wa-btn:hover { background: #1ebe5a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,211,102,.35); }
    .map-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(125,201,0,.12);
      color: var(--gold-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: .85rem;
      margin-top: 10px;
      transition: all .2s;
    }
    .map-btn:hover {
      background: rgba(125,201,0,.2);
      border-color: var(--gold-dim);
      transform: translateY(-1px);
    }

    /* Direct link box */
    .link-box {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .link-url {
      flex: 1; font-family: var(--font-main);
      font-size: .7rem; color: var(--gold);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .copy-btn {
      flex-shrink: 0;
      background: rgba(125,201,0,.1);
      border: 1px solid var(--border);
      border-radius: 6px; color: var(--gold);
      cursor: pointer; padding: 4px 10px;
      font-size: .72rem; font-weight: 600;
      transition: background .2s;
    }
    .copy-btn:hover { background: rgba(125,201,0,.2); }

    /* â”€â”€ LIGHTBOX â”€â”€ */
    #lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.92);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw; max-height: 88vh;
      border-radius: 12px; object-fit: contain;
      box-shadow: 0 20px 80px rgba(0,0,0,.6);
    }
    .lb-close {
      position: fixed; top: 20px; right: 24px;
      background: rgba(255,255,255,.12); border: none;
      color: white; font-size: 1.3rem; cursor: pointer;
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; z-index: 1;
    }
    .lb-close:hover { background: rgba(255,255,255,.25); }
    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.12); border: none;
      color: white; font-size: 1.2rem; cursor: pointer;
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; z-index: 1;
    }
    .lb-nav:hover { background: rgba(255,255,255,.25); }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }
    .lb-counter {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.5); color: white;
      padding: 5px 16px; border-radius: 20px;
      font-size: .75rem; font-family: var(--font-main);
    }

    /* â”€â”€ NOT FOUND â”€â”€ */
    .not-found {
      min-height: 80vh; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 16px;
      padding: 40px;
    }
    .not-found h2 { font-family: var(--font-main); font-size: 2.5rem; }
    .not-found h2 em { font-style: italic; color: var(--gold-light); }
    .not-found p { color: var(--text-muted); max-width: 400px; line-height: 1.7; }

    /* â”€â”€ DELIVERY TAG â”€â”€ */
    .delivery-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(125,201,0,.08); border: 1px solid var(--border);
      color: var(--gold-light); padding: 4px 12px; border-radius: 20px;
      font-size: .72rem; font-weight: 600; letter-spacing: .06em;
    }

    /* Native app layout: force mobile-first composition even if WebView width is reported large */
    html.native-app .biz-page {
      padding-top: var(--nav-offset);
    }
    html.native-app .biz-hero-inner {
      max-width: 100%;
      padding: 20px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      gap: 12px;
    }
    html.native-app .biz-logo-wrap {
      width: 86px;
      height: 86px;
      border-radius: 16px;
    }
    html.native-app .biz-cat-row,
    html.native-app .biz-meta-row {
      justify-content: flex-start;
    }
    html.native-app .biz-name {
      font-size: clamp(1.65rem, 7vw, 2.3rem);
      line-height: 1.08;
      margin-bottom: 10px;
    }
    html.native-app .biz-body {
      max-width: 100%;
      width: 100%;
      padding: 18px 12px calc(var(--safe-bottom) + 112px);
      display: grid;
      grid-template-columns: 1fr !important;
      gap: 14px;
      align-items: stretch;
      box-sizing: border-box;
    }
    html.native-app .biz-aside {
      position: static !important;
      top: auto !important;
    }
    html.native-app .biz-section {
      margin-bottom: 22px;
    }
    html.native-app .biz-section-title {
      font-size: 1.2rem;
      margin-bottom: 12px;
      padding-bottom: 10px;
    }
    html.native-app .gallery-featured,
    html.native-app .gallery-empty {
      aspect-ratio: 4 / 3;
    }
    html.native-app .gallery-strip {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    html.native-app .promo-card {
      flex-direction: column;
      border-radius: 12px;
    }
    html.native-app .promo-card-media {
      width: 100%;
      min-height: 148px;
    }
    html.native-app .promo-card-img,
    html.native-app .promo-card-img-placeholder {
      width: 100%;
      height: 148px;
    }
    html.native-app .promo-card-body {
      padding: 14px;
    }
    html.native-app .promo-card-title {
      font-size: 1.05rem;
    }
    html.native-app .aside-card {
      padding: 14px;
      border-radius: 12px;
    }
    html.native-app .contact-row {
      font-size: .82rem;
    }
    html.native-app .link-box {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: stretch;
    }
    html.native-app .copy-btn,
    html.native-app .wa-btn,
    html.native-app .map-btn {
      width: 100%;
      justify-content: center;
    }
    html.native-app .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* â”€â”€ RESPONSIVE â”€â”€ */
    @media (max-width: 900px) {
      .biz-body { grid-template-columns: 1fr; }
      .biz-aside { position: static; }
      .biz-hero-inner { flex-direction: column; align-items: center; text-align: center; }
      .biz-cat-row { justify-content: center; }
      .biz-meta-row { justify-content: center; }
      .promo-card { flex-direction: column; }
      .promo-card-media { width: 100%; min-height: 150px; }
      .promo-card-img, .promo-card-img-placeholder { width: 100%; height: 150px; }
      .promo-modal-card { width: min(500px, 95vw); padding: 12px; }
    }
    @media (max-width: 600px) {
      .biz-logo-wrap { width: 90px; height: 90px; border-radius: 16px; }
      .gallery-strip { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 760px) {
      .biz-body { padding: 28px 4% 60px; gap: 24px; }
      .biz-section { margin-bottom: 34px; }
      .biz-section-title { font-size: 1.25rem; flex-direction: column; align-items: flex-start; gap: 6px; }
      .aside-card { padding: 18px; }
      .gallery-featured, .gallery-empty { aspect-ratio: 4/3; }
      .promo-card-body { padding: 16px; }
      .promo-card-title { font-size: 1.12rem; }
      .promo-card-media { min-height: 122px; }
      .promo-card-img, .promo-card-img-placeholder { height: 122px; }
      #dirWrap { padding: 42px 12px calc(var(--safe-bottom) + 96px) !important; }
      #dirFilters { grid-template-columns: 1fr !important; }
      #dirMeta { flex-direction: column; align-items: stretch !important; gap: 10px; }
      #dirClearFilters { width: 100%; }
      #dirGrid {
        grid-template-columns: 1fr !important;
        width: 100%;
      }
      #dirGrid > a {
        display: block;
        width: 100%;

// URL / SLUG helpers
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function slugify(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim().replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

function getEmpresaSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('empresa') || params.get('e') || '';
}

function buildLink(slug) {
  const base = window.location.href.split('?')[0];
  return `${base}?empresa=${slug}`;
}


function buildBackendCandidates() {
  const candidates = [];
  const seen = new Set();
  const push = (origin) => {
    const value = String(origin || '').trim().replace(/\/$/, '');
    if (!value || seen.has(value)) return;
    seen.add(value);
    candidates.push(value);
  };

  if (window.location && /^https?:$/i.test(String(window.location.protocol || ''))) {
    push(window.location.origin);
  }

  const runtimeHost = (window.location && window.location.hostname) ? window.location.hostname : '127.0.0.1';
  push(`http://${runtimeHost}:8000`);
  push(`http://${runtimeHost}:8001`);

  try {
    const savedApiBase = localStorage.getItem('ceb_api_base');
    if (savedApiBase) {
      const parsed = new URL(savedApiBase, window.location.origin);
      push(parsed.origin);
    }
  } catch (e) {
    // ignore malformed localStorage values
  }

  if (!candidates.length) push('http://127.0.0.1:8000');
  return candidates;
}

function getBackendOrigin() {
  return buildBackendCandidates()[0];
}

async function fetchJsonWithBackendFallback(path, options) {
  const opts = options || {};
  const normalizedPath = String(path || '').startsWith('/') ? String(path || '') : `/${path || ''}`;
  const candidates = buildBackendCandidates();

  let lastError = null;
  let saw404 = false;

  for (const origin of candidates) {
    const url = `${origin}${normalizedPath}`;
    try {
      const resp = await fetch(url, { method: 'GET' });
      if (resp.status === 404) {
        saw404 = true;
        continue;
      }
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return await resp.json();
    } catch (err) {
      lastError = err;
    }
  }

  if (opts.allow404 && saw404) return null;
  throw lastError || new Error('Backend no disponible');
}

async function fetchPublicBusinesses() {
  const data = await fetchJsonWithBackendFallback('/api/v1/public/businesses');
  return Array.isArray(data) ? data : [];
}

async function fetchPublicBusinessBySlug(slug) {
  if (!slug) return null;
  const safeSlug = encodeURIComponent(String(slug).trim());
  const data = await fetchJsonWithBackendFallback(`/api/v1/public/businesses/${safeSlug}`, { allow404: true });
  return data || null;
}

// LOAD BUSINESS DATA
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function firstNonEmpty() {
  for (const value of arguments) {
    if (value === undefined || value === null) continue;
    if (typeof value === 'string') {
      const trimmed = value.trim();
      if (trimmed) return trimmed;
      continue;
    }
    return value;
  }
  return '';
}

function fixMojibakeText(value) {
  var text = String(value || '');
  var rules = [
    [/\u00C3\u00A1/g, '\u00E1'], [/\u00C3\u00A9/g, '\u00E9'], [/\u00C3\u00AD/g, '\u00ED'], [/\u00C3\u00B3/g, '\u00F3'], [/\u00C3\u00BA/g, '\u00FA'], [/\u00C3\u00B1/g, '\u00F1'],
    [/\u00C3\u0081/g, '\u00C1'], [/\u00C3\u0089/g, '\u00C9'], [/\u00C3\u008D/g, '\u00CD'], [/\u00C3\u0093/g, '\u00D3'], [/\u00C3\u009A/g, '\u00DA'], [/\u00C3\u0091/g, '\u00D1'],
    [/\u00C2\u00A1/g, '\u00A1'], [/\u00C2\u00BF/g, '\u00BF'], [/\u00C2\u00B7/g, '\u00B7'],
    [/\u00E2\u20AC\u201C/g, '\u2013'], [/\u00E2\u20AC\u201D/g, '\u2014'],
    [/\u00F0\u0178\u201C\u008D/g, '\u{1F4CD}'], [/\u00F0\u0178\u201C\u00B1/g, '\u{1F4F1}'], [/\u00F0\u0178\u203A\u00B5/g, '\u{1F6F5}'],
  ];
  rules.forEach(function (rule) { text = text.replace(rule[0], rule[1]); });
  return text.replace(/\uFFFD/g, '').trim();
}

function normalizeHorario(input) {
  const fallback = { L: true, M: true, X: true, J: true, V: true, S: false, D: false, apertura: '08:00', cierre: '18:00' };
  if (!input) return fallback;

  if (Array.isArray(input)) {
    const map = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];
    const out = { ...fallback };
    let firstOpen = null;
    input.forEach((item) => {
      if (!item) return;
      const idx = Number(item.day_of_week);
      const day = map[idx];
      if (!day) return;
      const isOpen = item.is_open !== false;
      out[day] = isOpen;
      if (isOpen && !firstOpen) firstOpen = item;
    });
    if (firstOpen) {
      out.apertura = String(firstOpen.open_time || out.apertura).slice(0, 5);
      out.cierre = String(firstOpen.close_time || out.cierre).slice(0, 5);
    }
    return out;
  }

  return {
    ...fallback,
    ...input,
    apertura: String(firstNonEmpty(input.apertura, input.open_time, fallback.apertura)).slice(0, 5),
    cierre: String(firstNonEmpty(input.cierre, input.close_time, fallback.cierre)).slice(0, 5),
  };
}

function normalizeRedes(input, fallbackSession) {
  const red = (input && typeof input === 'object') ? input : {};
  return {
    instagram: firstNonEmpty(red.instagram, input && input.instagram, fallbackSession && fallbackSession.instagram, ''),
    facebook: firstNonEmpty(red.facebook, input && input.facebook, fallbackSession && fallbackSession.facebook, ''),
    youtube: firstNonEmpty(red.youtube, input && input.youtube, fallbackSession && fallbackSession.youtube, ''),
  };
}

function buildWhatsAppUrl(raw) {
  const digits = String(raw || '').replace(/\D/g, '');
  if (digits.length < 10) return '';
  const withCountry = digits.startsWith('57') ? digits : `57${digits}`;
  return `https://wa.me/${withCountry}`;
}

function buildMapsUrl(address, locality) {
  const parts = [address, locality, 'Bogota', 'Colombia']
    .map((v) => String(v || '').trim())
    .filter(Boolean);
  if (!parts.length) return '';
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(parts.join(', '))}`;
}

function resolveAssetUrl(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (/^(data:|blob:)/i.test(raw)) return raw;

  const apiBase = (window.CEBApi && window.CEBApi.baseUrl)
    ? String(window.CEBApi.baseUrl)
    : `http://${window.location.hostname || '127.0.0.1'}:8000/api/v1`;
  const apiOrigin = apiBase.replace(/\/api\/v1\/?$/i, '');

  if (/^https?:\/\//i.test(raw)) {
    try {
      const parsed = new URL(raw);
      if (
        (parsed.hostname === '127.0.0.1' || parsed.hostname === 'localhost') &&
        parsed.port === '5500' &&
        /^\/uploads\//i.test(parsed.pathname || '')
      ) {
        return apiOrigin + parsed.pathname;
      }
    } catch (e) {
      // keep raw value
    }
    return raw;
  }

  if (/^\/uploads\//i.test(raw)) return apiOrigin + raw;
  if (/^uploads\//i.test(raw)) return apiOrigin + '/' + raw;
  return raw;
}

function normalizeNegocio(data, slug, fallbackSession) {
  const source = (data && typeof data === 'object') ? data : {};
  const session = (fallbackSession && typeof fallbackSession === 'object') ? fallbackSession : null;
  const isOwnBusiness = !!(session && slugify(firstNonEmpty(session.nombre, session.name, '')) === slug);

  const gallerySource = firstNonEmpty(source.galeria, source.gallery, source.images, session && session.galeria, isOwnBusiness ? Store.get('gallery', []) : []);
  const promosSource = firstNonEmpty(source.promos, session && session.promos, isOwnBusiness ? Store.get('promos', []) : []);

  return {
    nombre: fixMojibakeText(firstNonEmpty(source.nombre, source.name, source.business_name, session && session.nombre, 'Mi Negocio')),
    slug: firstNonEmpty(source.slug, slug, slugify(firstNonEmpty(source.nombre, source.name, ''))),
    categoria: fixMojibakeText(firstNonEmpty(source.categoria, source.category, session && session.categoria, '')),
    localidad: fixMojibakeText(firstNonEmpty(source.localidad, source.locality, session && session.localidad, '')),
    direccion: fixMojibakeText(firstNonEmpty(source.direccion, source.dir, source.address, session && session.dir, session && session.direccion, '')),
    descripcion: fixMojibakeText(firstNonEmpty(source.descripcion, source.description, session && session.descripcion, '')),
    whatsapp: fixMojibakeText(firstNonEmpty(source.whatsapp, source.wp, source.phone, source.telefono, session && session.wp, session && session.whatsapp, '')),
    horario: normalizeHorario(firstNonEmpty(source.horario, source.hours, session && session.horario, null)),
    domicilios: Boolean(source.domicilios ? source.has_delivery ? (session && session.domicilios)),
    redes: normalizeRedes(source.redes || source.socials || source, session),
    publicado: Boolean(source.publicado ? source.published ? true),
    logo: firstNonEmpty(
      source.logo,
      source.logo_path,
      source.logo_url,
      source.logoUrl,
      session && session.logo,
      isOwnBusiness ? Store.get('negLogoTemp', '') : '',

    galeria: Array.isArray(gallerySource) ? gallerySource : [],
    promos: Array.isArray(promosSource) ? promosSource : [],
    plan: fixMojibakeText(firstNonEmpty(source.plan, source.subscription_status, Store.get('user', {}).plan, 'GRATIS')),
  };
}

function loadNegocio(slug) {
  const allNegocios = Store.get('negocios', {});
  const currentNeg = Store.get('negocio', null);
  const currentSlug = currentNeg ? slugify(firstNonEmpty(currentNeg.nombre, currentNeg.name, '')) : '';
  const fallbackSession = currentSlug === slug ? currentNeg : null;

  if (allNegocios[slug]) return normalizeNegocio(allNegocios[slug], slug, fallbackSession);

  const byValue = Object.values(allNegocios).find((item) => {
    const itemSlug = firstNonEmpty(item && item.slug, '');
    const nameSlug = slugify(firstNonEmpty(item && item.nombre, item && item.name, ''));
    return itemSlug === slug || nameSlug === slug;
  });
  if (byValue) return normalizeNegocio(byValue, slug, fallbackSession);

  if (fallbackSession) return normalizeNegocio(fallbackSession, slug, fallbackSession);

  if (DEMO_NEGOCIOS[slug]) return normalizeNegocio(DEMO_NEGOCIOS[slug], slug, null);
  return null;
}

function buildNegocioFromSession(data, slug) {
  return normalizeNegocio(data || {}, slug, data || null);
}

function buildPromosHTML(promos) {
  const active = Array.isArray(promos)
    ? promos.filter((p) => {
        const status = String((p && (p.estado || p.status)) || '').toUpperCase();
        return status === 'PUBLICADO' || status === 'PUBLISHED' || !!(p && p.publicado);
      })
    : [];
  promoModalItems = active;
  if (!active.length) {
    return `<div class="promo-empty"><div style="font-size:1.8rem;margin-bottom:10px">&#128227;</div>Este negocio no tiene promociones activas esta semana.<br><small>Vuelve pronto para descubrir sus ofertas.</small></div>`;
  }

  return `<div class="promo-cards">${active.map((p, idx) => {
    const promoImg = resolveAssetUrl(firstNonEmpty(p && p.img, p && p.image_path, ''));
    const promoTitle = firstNonEmpty(p && p.titulo, 'Promocion');
    const mediaHtml = promoImg
      ? `<img class="promo-card-img" src="${promoImg}" alt="${promoTitle}" onerror="this.style.display='none';if(this.nextElementSibling){this.nextElementSibling.style.display='flex';}" /><div class="promo-card-img-placeholder" style="display:none">&#127991;</div>`
      : `<div class="promo-card-img-placeholder">&#127991;</div>`;

    return `
    <div class="promo-card" role="button" tabindex="0" onclick="openPromoModal(${idx})" onkeydown="if(event.key==='Enter'){openPromoModal(${idx});}">
      <div class="promo-card-media">${mediaHtml}</div>
      <div class="promo-card-body">
        <div class="promo-card-date">&#10022; PROMOCION ACTIVA &middot; ${p.publicado || p.fecha || ''}</div>
        <div class="promo-card-title">${p.titulo}</div>
        <div class="promo-card-content">${p.contenido || ''}</div>
        ${Array.isArray(p.images) && p.images.length ? `<div style="font-size:.72rem;color:var(--gold);margin-top:8px">Ver detalle (${p.images.length} imagen${p.images.length > 1 ? 'es' : ''})</div>` : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function getPromoModalImages(promo) {
  const rows = Array.isArray(promo && promo.images) ? promo.images : [];
  const list = [];
  for (let i = 0; i < rows.length; i += 1) {
    const row = rows[i] || {};
    const filePath = resolveAssetUrl(firstNonEmpty(row.file_path, row.path, ''));
    if (!filePath) continue;
    list.push({
      file_path: filePath,
      description: firstNonEmpty(row.description, ''),
      position: Number(firstNonEmpty(row.position, i) || i),
    });
  }
  if (!list.length) {
    const fallback = resolveAssetUrl(firstNonEmpty(promo && promo.img, promo && promo.image_path, ''));
    if (fallback) list.push({ file_path: fallback, description: '', position: 0 });
  }
  return list.slice(0, 3);
}

function renderPromoModalImage(images, index) {
  const media = document.getElementById('promoModalMedia');
  if (!media) return;
  if (!images.length) {
    media.innerHTML = '<div class="promo-modal-gallery-empty">Esta promociÃ³n no tiene imÃ¡genes cargadas.</div>';
    return;
  }
  const safeIndex = Math.max(0, Math.min(index, images.length - 1));
  promoModalImageIndex = safeIndex;
  const current = images[safeIndex];
  const safeDesc = String(current.description || '').trim();
  media.innerHTML = `
    <div class="promo-modal-gallery-main">
      <img id="promoModalMainImg" src="${current.file_path}" alt="Imagen promocion" />
    </div>
    <div class="promo-modal-img-desc" id="promoModalImgDesc">${safeDesc || 'Sin descripcion para esta imagen.'}</div>
    <div class="promo-modal-thumbs">
      ${images.map((img, idx) => `
        <button type="button" class="promo-modal-thumb ${idx === safeIndex ? 'active' : ''}" onclick="setPromoModalImage(${idx})">
          <img src="${img.file_path}" alt="Imagen ${idx + 1}" />
        </button>
      `).join('')}
    </div>
  `;
}

function setPromoModalImage(index) {
  const promo = promoModalItems[promoModalIndex];
  const images = getPromoModalImages(promo);
  renderPromoModalImage(images, Number(index || 0));
}

function openPromoModal(index) {
  const modal = document.getElementById('promoModal');
  if (!modal) return;
  if (!promoModalItems.length) return;
  const safePromoIndex = Math.max(0, Math.min(Number(index || 0), promoModalItems.length - 1));
  promoModalIndex = safePromoIndex;
  const promo = promoModalItems[safePromoIndex] || {};
  const title = firstNonEmpty(promo.titulo, promo.title, 'Promocion');
  const dateText = firstNonEmpty(promo.publicado, promo.fecha, '');
  const content = firstNonEmpty(promo.contenido, promo.content_html, '');
  const images = getPromoModalImages(promo);

  const titleEl = document.getElementById('promoModalTitle');
  const dateEl = document.getElementById('promoModalDate');
  const contentEl = document.getElementById('promoModalContent');
  if (titleEl) titleEl.textContent = title;
  if (dateEl) dateEl.textContent = dateText ? `Promocion activa - ${dateText}` : 'Promocion activa';
  if (contentEl) contentEl.innerHTML = content || '';
  renderPromoModalImage(images, 0);

  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePromoModal() {
  const modal = document.getElementById('promoModal');
  if (!modal) return;
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

// HOURS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const DAY_NAMES = { L:'Lunes', M:'Martes', X:'MiÃ©rcoles', J:'Jueves', V:'Viernes', S:'SÃ¡bado', D:'Domingo' };
const DAY_JS = [null,'D','L','M','X','J','V','S']; // JS getDay(): 0=Sun
const CEB_TZ = (window.CEB_REGION && window.CEB_REGION.timeZone) || 'America/Bogota';
const WEEKDAY_TO_KEY = { Sun:'D', Mon:'L', Tue:'M', Wed:'X', Thu:'J', Fri:'V', Sat:'S' };

function getBogotaNowInfo() {
  const now = new Date();
  try {
    const weekday = new Intl.DateTimeFormat('en-US', { weekday: 'short', timeZone: CEB_TZ }).format(now);
    const parts = new Intl.DateTimeFormat('en-US', {
      hour: '2-digit',
      minute: '2-digit',
      hour12: false,
      timeZone: CEB_TZ
    }).formatToParts(now);
    const hh = Number((parts.find((p) => p.type === 'hour') || {}).value || 0);
    const mm = Number((parts.find((p) => p.type === 'minute') || {}).value || 0);
    return { dayKey: WEEKDAY_TO_KEY[weekday] || 'L', minutes: hh * 60 + mm };
  } catch (e) {
    const dayKey = DAY_JS[now.getDay()];
    return { dayKey: dayKey, minutes: now.getHours() * 60 + now.getMinutes() };
  }
}

function checkIsOpen(horario) {
  if (!horario) return false;
  const nowInfo = getBogotaNowInfo();
  const day = nowInfo.dayKey;
  if (!horario[day]) return false;
  const [oh,om] = (horario.apertura||'08:00').split(':').map(Number);
  const [ch,cm] = (horario.cierre||'18:00').split(':').map(Number);
  const cur = nowInfo.minutes;
  return cur >= oh*60+om && cur <= ch*60+cm;
}

function buildHorarioHTML(horario) {
  if (!horario) return '';
  const todayKey = getBogotaNowInfo().dayKey;
  const rows = Object.entries(DAY_NAMES).map(([k,name]) => {
    const isToday = k === todayKey;
    const open    = horario[k];
    return `<tr class="${isToday?'today':''}">
      <td>${name}${isToday?' <em style="font-size:.68rem;color:var(--gold)">(hoy)</em>':''}</td>
      <td class="${open?'':'hours-closed'}">${open?(horario.apertura+' - '+horario.cierre):'Cerrado'}</td>
    </tr>`;
  }).join('');
  return `<table class="hours-table"><tbody>${rows}</tbody></table>`;
}

// COPY LINK
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function copyLink() {
  const url = document.getElementById('linkUrl')?.textContent;
  if (!url) return;
  navigator.clipboard.writeText(url).then(() => {
    showToast('Enlace copiado al portapapeles.', 'success');
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copiado'; setTimeout(() => btn.textContent = 'Copiar', 2000); }
  }).catch(() => {
    showToast('Copia manualmente: ' + url, 'info', 5000);
  });
}

// LIGHTBOX
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function openLightbox(index) {
  if (!lbImages.length) return;
  lbIndex = index;
  document.getElementById('lbImg').src = lbImages[lbIndex];
  document.getElementById('lbCounter').textContent = `${lbIndex+1} / ${lbImages.length}`;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function lbNavigate(dir) {
  lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
  document.getElementById('lbImg').src = lbImages[lbIndex];
  document.getElementById('lbCounter').textContent = `${lbIndex+1} / ${lbImages.length}`;
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.getElementById('promoModal').addEventListener('click', function(e) {
  if (e.target === this) closePromoModal();
});
document.addEventListener('keydown', e => {
  const lightboxOpen = document.getElementById('lightbox').classList.contains('open');
  const promoOpen = document.getElementById('promoModal').classList.contains('open');
  if (!lightboxOpen && !promoOpen) return;
  if (e.key === 'Escape') {
    if (lightboxOpen) closeLightbox();
    if (promoOpen) closePromoModal();
  }
  if (lightboxOpen && e.key === 'ArrowRight') lbNavigate(1);
  if (lightboxOpen && e.key === 'ArrowLeft') lbNavigate(-1);
});

// MAIN
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
document.addEventListener('DOMContentLoaded', async () => {
  const slug = getEmpresaSlug();
  if (!slug) {
    // No slug â€” show directory of all businesses
    await renderDirectory();
    return;
  }
  let neg = null;
  try {
    const fromApi = await fetchPublicBusinessBySlug(slug);
    if (fromApi) neg = normalizeNegocio(fromApi, slug, Store.get('negocio', null));
  } catch (e) {
    // fallback to local sources
  }

  if (!neg) neg = loadNegocio(slug);
  if (neg) renderPage(neg);
  else renderNotFound(slug);
});

async function renderDirectory() {
  const all = Store.get('negocios', {});
  const currentNeg = Store.get('negocio', null);
  const currentSlug = currentNeg ? slugify(firstNonEmpty(currentNeg.nombre, currentNeg.name, '')) : '';

  const demos = Object.values(DEMO_NEGOCIOS).map((n) =>
    normalizeNegocio(n, firstNonEmpty(n && n.slug, slugify(firstNonEmpty(n && n.nombre, n && n.name, ''))), null),
  );

  const stored = Object.values(all).map((n) => {
    const slug = firstNonEmpty(n && n.slug, slugify(firstNonEmpty(n && n.nombre, n && n.name, '')));
    const fallback = slug === currentSlug ? currentNeg : null;
    return normalizeNegocio(n, slug, fallback);
  });

  const bySlug = new Map();
  demos.forEach((n) => { if (n && n.slug) bySlug.set(n.slug, n); });
  stored.forEach((n) => { if (n && n.slug) bySlug.set(n.slug, n); });
  try {
    const fromApi = await fetchPublicBusinesses();
    fromApi.forEach((n) => {
      if (!n) return;
      const nSlug = firstNonEmpty(n.slug, slugify(firstNonEmpty(n.name, n.nombre, '')));
      if (!nSlug) return;
      bySlug.set(nSlug, normalizeNegocio(n, nSlug, null));
    });
  } catch (e) {
    // keep local/demos if backend is unavailable
  }

  const combined = Array.from(bySlug.values()).map((n) => ({ ...n, logo: resolveAssetUrl(n.logo) }));

  function esc(v) {
    return String(v || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function cleanText(v) {
    return fixMojibakeText(v)
      .replace(/\uFFFD/g, '')
      .replace(/\s{2,}/g, ' ')
      .trim();
  }

  function norm(v) {
    return cleanText(v)
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .trim();
  }

  function cardHTML(n) {
    const slug = esc(n.slug || '');
    const nombre = esc(cleanText(n.nombre || n.name || ''));
    const categoria = esc(cleanText(n.categoria || n.category || ''));
    const localidad = esc(cleanText(n.localidad || n.locality || ''));
    const logo = esc(n.logo || '');
    const icon = getCategoryEmoji(n.categoria || n.category || '');
    return `
      <a href="negocio.html?empresa=${slug}" style="display:block;width:100%;text-decoration:none;color:inherit">
        <div class="dir-card" style="background:var(--dark-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:border-color .2s,transform .2s;display:flex;align-items:center;gap:16px;box-sizing:border-box;width:100%" onmouseover="this.style.borderColor='var(--gold-dim)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='';this.style.transform=''">
          <div style="width:52px;height:52px;border-radius:12px;background:var(--dark-3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;overflow:hidden">${logo ? `<img src="${logo}" style="width:100%;height:100%;object-fit:cover" />` : `${icon}`}</div>
          <div style="min-width:0">
            <div style="font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nombre}</div>
            <div style="font-size:.78rem;color:var(--text-muted);margin-top:2px">${categoria} - ${localidad}</div>
            <div style="font-size:.7rem;color:var(--gold);font-family:var(--font-main);margin-top:4px">${slug}</div>
          </div>
        </div>
      </a>`;
  }

  const categories = Array.from(
    new Set(
      combined
        .map((n) => cleanText(n.categoria || n.category || ''))
        .filter(Boolean),
    ),
      ).sort((a, b) => a.localeCompare(b, 'es-419'));

  const localityOptions = [
    'Antonio Nari\u00f1o',
    'Barrios Unidos',
    'Bosa',
    'Chapinero',
    'Ciudad Bol\u00edvar',
    'Engativ\u00e1',
    'Fontib\u00f3n',
    'Kennedy',
    'La Candelaria',
    'Los M\u00e1rtires',
    'Puente Aranda',
    'Rafael Uribe Uribe',
    'San Crist\u00f3bal',
    'Santa Fe',
    'Suba',
    'Sumapaz',
    'Teusaquillo',
    'Tunjuelito',
    'Usaqu\u00e9n',
    'Usme',
  ];

  document.title = 'Directorio - Comercio e-Bogota';
  document.getElementById('bizPage').innerHTML = `
    <div id="dirWrap" style="max-width:1100px;margin:0 auto;padding:60px 5% 80px;box-sizing:border-box;width:100%">
      <div class="eyebrow" style="margin-bottom:12px">Directorio</div>
      <h1 style="font-family:var(--font-main);font-size:clamp(2rem,4vw,3rem);font-weight:400;margin-bottom:8px">Negocios en <em style="font-style:italic;color:var(--gold-light)">Bogot&aacute;</em></h1>
      <p style="color:var(--text-muted);margin-bottom:24px;font-size:.9rem">Encuentra comercios, tiendas y servicios locales en tu ciudad.</p>

      <div id="dirFilters" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:14px">
        <input id="dirSearchName" class="form-input" placeholder="Buscar por nombre de empresa" />
        <select id="dirSearchLocality" class="form-input">
          <option value="">Todas las localidades</option>
        </select>
        <select id="dirCategory" class="form-input">
          <option value="">Todas las categorias</option>
        </select>
      </div>

      <div id="dirMeta" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div id="dirCount" style="font-size:.78rem;color:var(--text-muted)"></div>
        <button id="dirClearFilters" class="btn btn-outline btn-sm">Limpiar filtros</button>
      </div>

      <div id="dirGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px"></div>
      <div id="dirEmpty" style="display:none;text-align:center;padding:36px;border:1px dashed var(--border);border-radius:var(--radius-lg);color:var(--text-muted);font-size:.9rem">
        No se encontraron negocios con esos filtros.
      </div>
    </div>`;

  const catSelect = document.getElementById('dirCategory');
  categories.forEach((c) => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    catSelect.appendChild(opt);
  });

  const nameInput = document.getElementById('dirSearchName');
  const localitySelect = document.getElementById('dirSearchLocality');
  const grid = document.getElementById('dirGrid');
  const empty = document.getElementById('dirEmpty');
  const count = document.getElementById('dirCount');

  localityOptions.forEach((loc) => {
    const opt = document.createElement('option');
    const cleanLoc = cleanText(loc);
    opt.value = cleanLoc;
    opt.textContent = cleanLoc;
    localitySelect.appendChild(opt);
  });

  function applyFilters() {
    const qName = norm(nameInput.value);
    const qLocality = norm(localitySelect.value);
    const qCategory = String(catSelect.value || '').trim();

    const filtered = combined.filter((n) => {
      const nName = norm(n.nombre || n.name || '');
      const nSlug = norm(n.slug || '');
      const nLocality = norm(n.localidad || n.locality || '');
      const nCategory = cleanText(n.categoria || n.category || '');

      if (qCategory && nCategory !== qCategory) return false;
      if (qName && !(nName.includes(qName) || nSlug.includes(qName))) return false;
      if (qLocality && nLocality !== qLocality) return false;
      return true;
    });

    grid.innerHTML = filtered.map(cardHTML).join('');
    empty.style.display = filtered.length ? 'none' : 'block';
    count.textContent = `${filtered.length} negocio(s)`;
  }

  nameInput.addEventListener('input', applyFilters);
  localitySelect.addEventListener('change', applyFilters);
  catSelect.addEventListener('change', applyFilters);
  document.getElementById('dirClearFilters').addEventListener('click', () => {
    nameInput.value = '';
    localitySelect.value = '';
    catSelect.value = '';
    applyFilters();
  });

  applyFilters();
}
</script>
